<a [routerLink]="['/artist', artist().slug]"
   [attr.aria-label]="'View ' + artist().name + ' top 5 songs'"
   class="group block bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden hover:border-zinc-600 hover:bg-zinc-800/80 hover:-translate-y-0.5 transition-all duration-200 cursor-pointer focus:outline-none focus-visible:ring-2 focus-visible:ring-violet-500">
  <div class="h-2 w-full" [style.background-color]="artist().avatarColor"></div>
  <div class="p-5">
    <div class="flex items-center gap-4 mb-3">
      <div class="w-12 h-12 rounded-full flex items-center justify-center text-white text-xl font-bold shrink-0"
           [style.background-color]="artist().avatarColor"
           aria-hidden="true">
        {{ artist().name[0] }}
      </div>
      <div class="min-w-0 flex-1">
        <h3 class="text-white font-semibold text-base leading-tight truncate group-hover:text-violet-300 transition-colors">
          {{ artist().name }}
        </h3>
        <p class="text-zinc-500 text-xs mt-0.5 truncate">{{ artist().genres.join(' · ') }}</p>
      </div>
    </div>
    <ol class="space-y-1.5">
      @for (song of artist().songs; track song.rank) {
        <li class="flex items-baseline gap-2 text-sm">
          <span class="text-zinc-600 font-mono w-4 shrink-0 text-right">{{ song.rank }}</span>
          <span class="text-zinc-300 truncate">{{ song.title }}</span>
        </li>
      }
    </ol>
    <div class="mt-4 pt-3 border-t border-zinc-800 flex items-center justify-end">
      <span class="text-violet-400 text-xs font-medium group-hover:text-violet-300 transition-colors flex items-center gap-1">
        View profile
        <span class="transition-transform group-hover:translate-x-0.5">→</span>
      </span>
    </div>
  </div>
</a>
