<a [routerLink]="['/artist', artist().slug]"
   class="group block bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden hover:border-zinc-600 hover:bg-zinc-800/80 transition-all duration-200 cursor-pointer">
  <div class="h-2 w-full" [style.background-color]="artist().avatarColor"></div>
  <div class="p-5">
    <div class="flex items-center gap-4 mb-4">
      <div class="w-12 h-12 rounded-full flex items-center justify-center text-white text-xl font-bold shrink-0"
           [style.background-color]="artist().avatarColor">
        {{ artist().name[0] }}
      </div>
      <div class="min-w-0">
        <h3 class="text-white font-semibold text-base leading-tight truncate group-hover:text-violet-300 transition-colors">
          {{ artist().name }}
        </h3>
        <div class="flex flex-wrap gap-1 mt-1">
          @for (genre of artist().genres; track genre) {
            <span class="text-xs text-zinc-400 bg-zinc-800 rounded px-1.5 py-0.5">{{ genre }}</span>
          }
        </div>
      </div>
    </div>
    <ol class="space-y-1.5">
      @for (song of artist().songs; track song.rank) {
        <li class="flex items-baseline gap-2 text-sm">
          <span class="text-zinc-600 font-mono w-4 shrink-0 text-right">{{ song.rank }}</span>
          <span class="text-zinc-300 truncate">{{ song.title }}</span>
        </li>
      }
    </ol>
    <div class="mt-4 pt-4 border-t border-zinc-800 flex items-center justify-between">
      <span class="text-zinc-600 text-xs">{{ artist().viewCount | number }} views</span>
      <span class="text-violet-400 text-xs font-medium group-hover:text-violet-300 transition-colors">View profile →</span>
    </div>
  </div>
</a>
