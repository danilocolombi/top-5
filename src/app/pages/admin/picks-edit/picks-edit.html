<main class="min-h-[calc(100vh-4rem)] bg-zinc-950 px-4 sm:px-6 lg:px-8 py-10">
  <div class="max-w-3xl mx-auto">

    <a routerLink="/admin" class="text-xs text-zinc-400 hover:text-white mb-4 inline-block">← Back</a>
    <h1 class="text-2xl font-bold text-white mb-1">
      Edit {{ kind() === 'weekly' ? 'weekly' : 'throwback' }} pick
    </h1>
    <p class="text-zinc-500 text-sm mb-8">Five songs that anchor this curation.</p>

    <div class="space-y-6">
      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-medium text-zinc-400 mb-1.5">Week of</label>
          <input type="date" [ngModel]="weekOf()" (ngModelChange)="weekOf.set($event)"
                 class="w-full px-3 py-2 bg-zinc-900 border border-zinc-800 rounded-lg text-white text-sm focus:outline-none focus:border-violet-500" />
        </div>
      </div>

      <div>
        <label class="block text-xs font-medium text-zinc-400 mb-1.5">Editor note</label>
        <textarea rows="2" [ngModel]="editorNote()" (ngModelChange)="editorNote.set($event)"
                  class="w-full px-3 py-2 bg-zinc-900 border border-zinc-800 rounded-lg text-white text-sm focus:outline-none focus:border-violet-500"></textarea>
      </div>

      <section class="space-y-3">
        <h2 class="text-sm font-semibold uppercase tracking-wide text-zinc-400">Songs</h2>
        @for (s of songs(); track $index; let i = $index) {
          <div class="grid grid-cols-12 gap-2 items-center">
            <span class="col-span-1 text-zinc-500 text-sm">#{{ i + 1 }}</span>
            <select [ngModel]="s.artistId" (ngModelChange)="updateRow(i, 'artistId', $event)"
                    class="col-span-3 px-2 py-2 bg-zinc-900 border border-zinc-800 rounded-lg text-white text-sm focus:outline-none focus:border-violet-500">
              <option [ngValue]="null">— artist —</option>
              @for (a of artists(); track a.id) {
                <option [ngValue]="a.id">{{ a.name }}</option>
              }
            </select>
            <input type="text" placeholder="Title" [ngModel]="s.title"
                   (ngModelChange)="updateRow(i, 'title', $event)"
                   class="col-span-3 px-3 py-2 bg-zinc-900 border border-zinc-800 rounded-lg text-white text-sm focus:outline-none focus:border-violet-500" />
            <input type="text" placeholder="Album" [ngModel]="s.album"
                   (ngModelChange)="updateRow(i, 'album', $event)"
                   class="col-span-3 px-3 py-2 bg-zinc-900 border border-zinc-800 rounded-lg text-white text-sm focus:outline-none focus:border-violet-500" />
            <input type="number" placeholder="Year" [ngModel]="s.year"
                   (ngModelChange)="updateRow(i, 'year', $event)"
                   class="col-span-2 px-3 py-2 bg-zinc-900 border border-zinc-800 rounded-lg text-white text-sm focus:outline-none focus:border-violet-500" />
          </div>
        }
      </section>

      @if (error()) {
        <p class="text-sm text-red-400">{{ error() }}</p>
      }

      <div class="flex gap-3 pt-2">
        <button (click)="save()" [disabled]="saving()"
                class="px-5 py-2.5 rounded-lg bg-gradient-to-r from-violet-500 to-pink-500 text-white text-sm font-medium hover:opacity-90 disabled:opacity-50 transition">
          {{ saving() ? 'Saving…' : 'Save' }}
        </button>
        <a routerLink="/admin"
           class="px-5 py-2.5 rounded-lg border border-zinc-800 text-zinc-300 text-sm hover:bg-zinc-900">
          Cancel
        </a>
      </div>
    </div>
  </div>
</main>
