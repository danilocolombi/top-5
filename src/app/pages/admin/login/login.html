<main class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-4 py-12 bg-zinc-950">
  <div class="w-full max-w-sm">
    <h1 class="text-2xl font-bold text-white mb-1">Admin sign in</h1>
    <p class="text-zinc-500 text-sm mb-6">Editor access only.</p>

    <form (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label class="block text-xs font-medium text-zinc-400 mb-1.5">Email</label>
        <input type="email" name="email" [(ngModel)]="email" required autocomplete="email"
               class="w-full px-3 py-2 bg-zinc-900 border border-zinc-800 rounded-lg text-white text-sm focus:outline-none focus:border-violet-500" />
      </div>
      <div>
        <label class="block text-xs font-medium text-zinc-400 mb-1.5">Password</label>
        <input type="password" name="password" [(ngModel)]="password" required autocomplete="current-password"
               class="w-full px-3 py-2 bg-zinc-900 border border-zinc-800 rounded-lg text-white text-sm focus:outline-none focus:border-violet-500" />
      </div>

      @if (error()) {
        <p class="text-xs text-red-400">{{ error() }}</p>
      }

      <button type="submit" [disabled]="loading()"
              class="w-full py-2.5 rounded-lg bg-gradient-to-r from-violet-500 to-pink-500 text-white text-sm font-medium hover:opacity-90 disabled:opacity-50 transition">
        {{ loading() ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>
  </div>
</main>
