<main class="min-h-[calc(100vh-4rem)] bg-zinc-950 px-4 sm:px-6 lg:px-8 py-10">
  <div class="max-w-3xl mx-auto">

    <a routerLink="/admin" class="text-xs text-zinc-400 hover:text-white mb-4 inline-block">← Back</a>
    <h1 class="text-2xl font-bold text-white mb-1">Edit editor's picks</h1>
    <p class="text-zinc-500 text-sm mb-8">Four featured artists shown on the home page. Leave a slot empty to skip.</p>

    <div class="space-y-3">
      @for (slot of slots(); track $index; let i = $index) {
        <div class="flex items-center gap-3">
          <span class="text-zinc-500 text-sm w-6 shrink-0">#{{ i + 1 }}</span>
          <select title="Artist"
                  [ngModel]="slot" (ngModelChange)="updateSlot(i, $event)"
                  class="flex-1 px-3 py-2 bg-zinc-900 border border-zinc-800 rounded-lg text-white text-sm focus:outline-none focus:border-violet-500">
            <option [ngValue]="null">— empty —</option>
            @for (a of artists(); track a.id) {
              <option [ngValue]="a.id">{{ a.name | titlecase }}</option>
            }
          </select>
        </div>
      }
    </div>

    @if (error()) {
      <p class="text-sm text-red-400 mt-4">{{ error() }}</p>
    }

    <div class="flex gap-3 pt-6">
      <button type="button" (click)="save()" [disabled]="saving()"
              class="px-5 py-2.5 rounded-lg bg-gradient-to-r from-violet-500 to-pink-500 text-white text-sm font-medium hover:opacity-90 disabled:opacity-50 transition">
        {{ saving() ? 'Saving…' : 'Save' }}
      </button>
      <a routerLink="/admin"
         class="px-5 py-2.5 rounded-lg border border-zinc-800 text-zinc-300 text-sm hover:bg-zinc-900">
        Cancel
      </a>
    </div>
  </div>
</main>
